services:
  postgres:
    image: postgres:15-alpine
    container_name: neobarter-postgres
    environment:
      POSTGRES_USER: neobarter
      POSTGRES_PASSWORD: neobarter123
      POSTGRES_DB: neobarter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neobarter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neobarter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: neobarter-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: neobarter-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 数据库迁移（一次性 job，完成后退出）
  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: neobarter-server:local
    container_name: neobarter-migrate
    command: ["/app/migrate"]
    environment: &server-env
      NEOBARTER_DATABASE_HOST: postgres
      NEOBARTER_DATABASE_PORT: "5432"
      NEOBARTER_REDIS_HOST: redis
      NEOBARTER_REDIS_PORT: "6379"
      NEOBARTER_ELASTICSEARCH_ADDRESSES: http://elasticsearch:9200
      NEOBARTER_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      NEOBARTER_JWT_SECRET: change-me-in-production
      NEOBARTER_SERVER_MODE: release
      NEOBARTER_OSS_PROVIDER: local
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    image: neobarter-server:local
    container_name: neobarter-server
    command: ["/app/server"]
    ports:
      - "8080:8080"
    environment: *server-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ES 索引同步消费者
  consumer:
    image: neobarter-server:local
    container_name: neobarter-consumer
    command: ["/app/consumer"]
    environment: *server-env
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: neobarter-ai
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://neobarter:neobarter123@postgres:5432/neobarter
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: neobarter-web
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  es_data:
  rabbitmq_data:
